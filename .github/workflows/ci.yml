name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Ruff (lint + PEP8 + PEP257)
        run: python -m ruff check src tests
      - name: Black (format check)
        run: python -m black --check src tests
      - name: MyPy (static types)
        run: python -m mypy src tests
      - name: Pyright (static types)
        run: python -m pyright src tests
      - name: Pytest (coverage >= 85%)
        run: python -m pytest
      - name: Bandit (security)
        run: python -m bandit -r src -c pyproject.toml
      - name: Build docs (pdoc)
        run: python -m pdoc --output-directory docs/site src/json2csv
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site/
      - name: Bump build number (solo en push a main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: python script/bump_build.py
      - name: Commit y push del nuevo build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/json2csv/version.py README.md CHANGELOG.md
          git commit -m "chore: incremento automatico de build [skip ci]"
          git push origin HEAD:main
